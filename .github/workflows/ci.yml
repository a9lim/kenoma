name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Install dev extras so pyright can resolve torch / transformers
      # when it analyzes kenoma.py.
      - run: pip install -e ".[dev]"
      - run: pyright

  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pyproject.toml declares the version as `dynamic` and reads it from
      # kenoma.__version__ via setuptools' `attr:`. This job verifies the
      # AST-read actually resolves end-to-end after install — catches
      # regressions where a top-of-module import would force setuptools
      # to evaluate (and potentially fail on) the heavy torch path.
      - run: pip install .
      - name: Verify dynamic version resolves
        run: |
          python - <<'PY'
          import importlib.metadata
          import kenoma
          installed = importlib.metadata.version("kenoma")
          if installed != kenoma.__version__:
              raise SystemExit(
                  f"dynamic version mismatch: installed={installed}, "
                  f"__version__={kenoma.__version__}"
              )
          print(f"OK: kenoma {installed}")
          PY

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check artifacts
        run: python -m twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
