[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "kenoma"
version = "0.1.0"
description = "A fake shell powered by raw LLM completion."
requires-python = ">=3.9"
dependencies = [
    "torch",
    "transformers>=4.44",
    "accelerate",
    "sentencepiece",
]

[project.optional-dependencies]
quantize = ["bitsandbytes"]

[project.scripts]
kenoma = "kenoma:main"

[tool.setuptools]
py-modules = ["kenoma"]
